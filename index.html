<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Play Free Online Games at Svk - Play Now!</title>
    <link rel="stylesheet" href="style.css?v=1.1.1">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    
    <header class="main-header">
        <div class="header-container">
            <div class="logo" onclick="location.reload()">S<span class="logo-v">v</span>K</div>
            <div class="header-controls">
                <nav class="nav-links">
                    <a href="#" class="active" data-filter="all">All Games</a>
                    <a href="#" data-filter="arcade">Arcade</a>
                    <a href="#" data-filter="action">Action</a>
                    <a href="#" data-filter="puzzle">Puzzle</a>
                </nav>
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" placeholder="Search games..." autocomplete="off">
                    <button id="search-clear-btn" style="display: none;">✕</button>
                </div>
            </div>
        </div>
    </header>

    
    <main class="portal-container">
        
        
        <section class="featured-section">
            <div class="featured-card" id="featured-game-card" style="display: none;">
                <div class="featured-info">
                    <div class="featured-tags-row">
                        <span class="tag" id="featured-tag">FEATURED GAME</span>
                        <span class="tag-category" id="featured-category">CATEGORY</span>
                    </div>
                    <h1 class="featured-title" id="featured-title">Loading...</h1>
                    <p class="featured-desc" id="featured-desc">Loading description...</p>
                    <button class="play-btn-large" id="featured-play-btn">PLAY NOW</button>
                </div>
                <div class="featured-media">
                    
                    <div class="media-placeholder" id="featured-media-img"></div>
                </div>
            </div>
        </section>

        
        <section class="games-section" id="recently-played-section" style="display: none;">
            <h2 class="section-title">Recently Played</h2>
            <div class="games-grid" id="recently-played-grid-container">
                
            </div>
        </section>

        
        <section class="games-section">
            <h2 class="section-title" id="games-section-title">Popular Games</h2>
            <div class="games-grid" id="games-grid-container">
                
            </div>
        </section>

    </main>

    
    <div id="gameModal" class="game-modal">
        <div class="modal-backdrop" onclick="portal.closeGame()"></div>
        <div class="modal-content">
            <button id="floatingCloseBtn" class="floating-close-btn" onclick="portal.closeGame()" title="Close">✕</button>
            <div class="modal-header">
                <h3 id="modal-game-title">Game Title</h3>
                <div class="modal-controls">
                    <button id="fullscreenBtn" title="Fullscreen">⛶</button>
                    <button id="closeBtn" onclick="portal.closeGame()" title="Close">✕</button>
                </div>
            </div>
            <div class="iframe-wrapper" id="game-iframe-wrapper">
                
                <button id="mobile-back-btn" class="mobile-back-btn" onclick="portal.exitMobileFullscreen()" style="display: none;">
                    ✕ Back
                </button>
                
            </div>
            
            
            <div class="mobile-info-panel" id="game-mobile-panel">
                
            </div>
        </div>
        
        
        <div class="game-sidebar" id="game-pc-sidebar">
            
        </div>
    </div>



    
    <script src="portal.js?v=1.0.1"></script>
</body>
</html>
