<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Drop-Off</title>
    <style>
        @font-face {
            font-family: "Bungee";
            src: url("Bungee/Bungee-Regular.ttf");
        }

        @font-face {
            font-family: "Gloria Hallelujah";
            src: url("Gloria_Hallelujah/GloriaHallelujah-Regular.ttf");
        }
        .obstacle {
            position: absolute;
            left: 0;
            width: 100%;
            height: 30px;
            z-index: 1;
            will-change: transform;        /* 🚀 stay on GPU */
            transform: translateY(0);      /* initial transform */
        }

        body {
            margin: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            touch-action: none;
        }

        .game-area {
            width: 100%;
            max-width: 380px;
            height: 100%;
            height: 100dvh;
            background: #0a0a1f;
            position: relative;
            overflow: hidden;
            margin: 0 auto;
            border-left: 6px solid #222;
            border-right: 6px solid #222;
            box-sizing: border-box;   /* include borders in width */
        }

        #gameSurface {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: #0a0a1f;               /* just a fallback solid colour */
            box-shadow: inset 0 0 120px rgba(0,0,0,0.9);
            will-change: transform;            /* for screen shake */
        }
        #bgLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10000000vh;
            pointer-events: none;
            will-change: transform;
            transform: translateY(0);
            background: 
                radial-gradient(circle at 30% 20%, rgba(255,255,255,0.9) 1px, transparent 2px),
                radial-gradient(circle at 70% 40%, rgba(255,255,255,0.8) 1px, transparent 2px),
                radial-gradient(circle at 20% 70%, rgba(255,255,255,0.7) 1px, transparent 2px),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.85) 1px, transparent 2px),
                linear-gradient(#0a0a1f 2px, transparent 2px);
            background-size: 
                180px 180px,
                220px 220px,
                150px 150px,
                190px 190px,
                100% 80px;
        }

        #ball {
            width: 50px;
            height: 50px;
            position: absolute;
            will-change: transform;        /* no more top/left layout recalc */
        }

        #ball::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: red;
            border-radius: 50%;
            z-index: 2;
        }

        #ball.slamming::before {
            box-shadow: 0 0 20px 10px rgba(255, 100, 0, 0.7);
            transition: box-shadow 0.75s linear;
        }

        #fire-sprite {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            background-image: url('fire_spritesheet.png');
            background-size: 6000px 200px;
            background-repeat: no-repeat;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            transition: opacity 0.75s linear;
            z-index: 1;
            pointer-events: none;
        }

        #ball.slamming #fire-sprite {
            transform: translate(-50%, -92%) scale(1.5); /* Increased scale to 1.5 */
            opacity: 0.9;
            animation: playFire 1.0s steps(30) infinite;
        }

        #menu-fire-sprite {
            position: absolute;
            width: 200px;
            height: 200px;
            left: 50%;
            top: 120%; /* Centered with menuMeteor top */
            transform: translate(-50%, -92%) scale(1.6); /* Increased scale to 1.6 */
            transform-origin: center center;
            pointer-events: none;
            z-index: 0;
            opacity: 0.9;
            background-image: url('fire_spritesheet.png');
            background-size: 6000px 200px;
            background-repeat: no-repeat;
            animation: playFire 1.0s steps(30) infinite;
        }

        @keyframes playFire {
            from { background-position: 0px 0; }
            to { background-position: -6000px 0; }
        }

        #slamButton {
            display: none;
            user-select: none;
            -webkit-user-select: none; /* Safari/iOS */
            position: fixed;
            bottom: 50px;
            right: -120px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: orange;
            color: white;
            font-weight: bold;
            border: none;
            z-index: 100;
            touch-action: none;
            transition: right 0.45s cubic-bezier(0.19, 1, 0.22, 1);
        }
        @media (pointer: coarse) {
            #slamButton {
                display: flex;
            }
        }

        #mobilePauseButton {
            position: absolute;
            top: -90px;
            right: 0;
            width: 60px;
            height: 60px;
            background-color: #9499ff;
            z-index: 1000;
            cursor: pointer;
            touch-action: none;
            transition: top 0.45s cubic-bezier(0.19, 1, 0.22, 1);
            border-radius: 50%;
        }

        #slamButton.show {
            right: 20px;
        }

        #mobilePauseButton.show {
            top: 0;
        }

        .pause-bars {
            position: absolute;
            top: 17px;
            right: 18px;
            width: 20px;
            height: 24px;
            display: flex;
            justify-content: space-between;
        }

        .pause-bars::before,
        .pause-bars::after {
            content: '';
            width: 7px;
            height: 100%;
            background-color: #333333;
            border-radius: 1px;
        }

        #pauseMenuOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 3000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        .pause-panel {
            text-align: center;
            background: #222;
            border: 4px solid #444;
            padding: 30px 20px;
            width: 260px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .coin-toast {
            position: fixed;
            left: 50%;
            bottom: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 5000;
        }
        .coin-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .pause-title {
            color: #ffcc00;
            font-size: 38px;
            font-family: 'Courier New', Courier, monospace;
            margin: 0 0 10px 0;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .pause-score {
            color: #fff;
            font-size: 18px;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .pause-score span {
            color: #00ffcc;
            font-weight: bold;
        }

        .pause-btn {
            display: block;
            width: 100%;
            box-sizing: border-box;
            background-color: #ffffff;
            color: #000000;
            font-family: 'Courier New', Courier, monospace;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: 4px solid #000000;
            border-radius: 30px;
            padding: 10px 0;
            margin: 15px 0;
            box-shadow: 0 5px 0 #000000;
            transition: transform 0.05s ease, box-shadow 0.05s ease;
        }

        .pause-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #000000;
        }

        .pause-btn.restart {
            background-color: #ff3333;
            color: #fff;
            border: 4px solid #000000;
            box-shadow: 0 5px 0 #000000;
        }

        #startMenu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            background: transparent;
            overflow: visible;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.6s ease;
        }

        #startMenu.slide-off {
            transform: translateY(-100%);
            opacity: 0;
        }

        .game-title-container {
            font-family: "Bungee";
            position: relative;
            width: 100%;
            height: 160px;
            margin-top: 0px;
            margin-bottom: 215px;
            overflow: visible;
            animation: bounceIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        .game-title-container span {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 60px;
            margin-left: -30px;
            text-align: center;
            font-size: 58px;
            color: #d0ff00;
            text-shadow:
                1px 1px 0 #7aa000,
                2px 2px 0 #7aa000,
                3px 3px 0 #7aa000,
                4px 4px 0 #7aa000,
                5px 5px 0 #7aa000,
                6px 6px 0 #000000;
            -webkit-text-stroke: 3px #00000079;
            filter: drop-shadow(0px 6px 0px #0000006e);
            transform-origin: 50% 160px;
        }


        .char-d {
            transform: rotate(-52deg);
        }

        .char-r {
            transform: rotate(-36deg);
        }

        .char-o {
            transform: rotate(-21deg);
        }

        .char-p {
            transform: rotate(-6deg);
        }

        .char-dash {
            transform: rotate(6deg);
        }

        .char-o2 {
            transform: rotate(22deg);
        }

        .char-f {
            transform: rotate(36deg);
        }

        .char-f2 {
            transform: rotate(47deg);
        }

        @keyframes bounceIn {
            0% {
                transform: translateY(-100px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        #playButton {
            font-family: "Gloria Hallelujah", cursive;
            width: 160px;
            height: 60px;
            background: rgb(117, 255, 63);
            color: rgb(51, 110, 27);
            font-size: 30px;
            font-weight: bold;
            border: 4px solid rgb(51, 110, 27);
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 40px;
            box-shadow: 0 0 0 rgb(51, 110, 27);
            transform-origin: center;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
                box-shadow: 4px 4px 4px rgb(51, 110, 27);
            }

            100% {
                transform: scale(1);
            }
        }

        .menu-row {
            display: flex;
            gap: 10px;
        }

        .secondary-btn {
            background: rgb(143, 248, 255);
            color: #000000;
            border: 2px solid #000000;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #000;
            transition: background 0.2s, transform 0.1s;
        }

        .skins {
            color: #000000;
            border: 2px solid #000000;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #000;
            animation: skinbutton 10s linear infinite;
        }

        @keyframes skinbutton {
            0%   { background-color: hsl(0,   100%, 50%); }
            17%  { background-color: hsl(60,  100%, 50%); }
            33%  { background-color: hsl(120, 100%, 50%); }
            50%  { background-color: hsl(180, 100%, 50%); }
            67%  { background-color: hsl(240, 100%, 50%); }
            83%  { background-color: hsl(300, 100%, 50%); }
            100% { background-color: hsl(360, 100%, 50%); }
        }

        .secondary-btn2 {
            background: #ff8c00;
            color: #000000;
            border: 2px solid #000000;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #000;
            transition: background 0.2s, transform 0.1s;
        }

        .secondary-btn3 {
            position: relative;
            overflow: hidden;
            color: #000000;
            border: 2px solid #000000;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #000;
            background: linear-gradient(105deg, #bf953f 0%, #f5d97e 50%, #aa771c 100%);
        }

        .secondary-btn3::before,
        .secondary-btn3::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(105deg, transparent 0%, rgba(255,255,255,0.6) 50%, transparent 100%);
            animation: shine 3.5s linear infinite;
        }

        .secondary-btn3::before {
            animation-delay: 1.75s;
        }

        @keyframes shine {
            0%   { left: -100%; }
            100% { left: 150%; }
        }

        #settingsBtn {
            background-color: #00ffccc4;
            box-shadow: 0 4px 0 transparent;
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 3000;
            font-size: 22px;
            padding: 8px 10px;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #settingsBtn.slide-off {
            transform: translateX(120px);
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.6s ease;
        }

        .secondary-btn:hover {
            transform: scale(1.05);
        }

        .secondary-btn2:hover {
            transform: scale(1.05);
        }

        .secondary-btn3:hover {
            transform: scale(1.05);
        }

        .solid-breakable {
            position: absolute;
            left: 0;
            width: 100%;
            height: 30px;
            /* background replaced by image in JS */
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.8);
            border-radius: 4px;
            z-index: 5;
        }

        .wall-block {
            height: 30px;
            /* background replaced by image in JS */
            border-bottom: 2px solid #000;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
        }

        #countdownOverlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2500;
            pointer-events: none;
            display: none;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-size: 150px;
            font-weight: 1000;
            color: #ffffff;
            opacity: 0.5;
            -webkit-text-stroke: 3px #000000;
        }

        #settingsMenuOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 4000;
            display: none;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }

        .settings-panel {
            background-color: #333333;
            width: 280px;
            padding: 25px 20px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            color: #ffffff;
            position: relative;
            box-sizing: border-box;
            border: 2px solid #444444;
        }

        .settings-title {
            margin: 0 0 20px 0;
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
        }

        .close-settings-btn {
            position: absolute;
            top: 12px;
            right: 15px;
            background: none;
            border: none;
            color: #ff3333;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 18px 0;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }


        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }


        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }


        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #555555;
            transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 34px;
        }


        .slider:before {
            position: absolute;
            content: "";
            width: 24px;
            height: 24px;
            left: 4px;
            top: 4px;
            background-color: #ffffff;
            transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #2ecc71;
        }

        input:checked+.slider:before {
            transform: translateX(28px);
        }

        .settings-credits {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #444444;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            opacity: 0.6;
        }

        #gameOverOverlay {
            font-family: "Boogaloo", system-ui, sans-serif;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100000000000000;
            display: none;
            pointer-events: auto;
            --mask-x: 50%;
            --mask-y: 50%;
        }


        #gameOverOverlay::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);


            -webkit-mask-image: radial-gradient(circle 75px at var(--mask-x) var(--mask-y), transparent 80%, black 100%);
            mask-image: radial-gradient(circle 75px at var(--mask-x) var(--mask-y), transparent 80%, black 100%);
            z-index: -1;
        }
        
        
        .control-deck {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 24px 20px 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transform: translateY(100%);
            opacity: 0;
            animation: slideUpDeck 0.4s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            animation-delay: 0.6s;
        }

        @keyframes slideUpDeck {
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .deck-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }


        .deck-btn {
            flex: 1;
            background-color: #ffffff;
            color: #000000;
            font-family: 'Courier New', Courier, monospace;
            font-size: 21px;
            font-weight: bold;
            cursor: pointer;
            border: 4px solid #000000;
            border-radius: 28px;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 5px 0 #000000;
            transition: transform 0.05s ease, box-shadow 0.05s ease;
            user-select: none;
            -webkit-user-select: none;
        }
        .deck-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #000000;
        }
        /* .score-text {
            margin: 0 0 8px 0;
            text-align: center;

            color: rgb(0, 0, 0);
            background-color: white;
            font-family: "Bungee";
            font-size: 28px;
            border-radius: 20px;
            border: black;
            box-shadow: 0 5px 0 #000000;

        } */

        .score-text {
            margin: 8px auto 18px;
            padding: 16px 28px;
            font-family: "Bungee", sans-serif;
            font-size: 30px;
            background: linear-gradient(#ffee8d, #ffc95e);
            color: #000;
            border: 5px solid #000;
            border-radius: 22px;
            box-shadow: 0 8px 0 #000;
            font-weight: 900;
            letter-spacing: 1.5px;
        }
        .deck-btn.retry {
            background-color: #92ff92;
        }
        .deck-btn.revive {
            background-color: #8da7ff;
            width: 100%;
            box-sizing: border-box;
        }
        .double-coins {
            background: linear-gradient(
                90deg,
                #bf953f,
                #f5d97e,
                #aa771c,
                #f5d97e,
                #bf953f
            );
            background-size: 200% 100%;
            animation: doubleshine 2s linear infinite;
            color: #000000;
            flex: 1;
            box-sizing: border-box;
            max-width: 100%;
        }
        @keyframes doubleshine {
            from {background-position: 200% center;}
            to {background-position: 0% center;}
        }
        .deck-btn.home {
            background-color: #ffb1e1;
        }
        .trap-line {
            position: absolute;
            background-color: #ffffff;
            height: 20px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
            transform-origin: center;
            opacity: 0;
            animation: slamLine 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes slamLine {
            0% {
                transform: scale(3) rotate(var(--angle));
                opacity: 0;
            }
            100% {
                transform: scale(1) rotate(var(--angle));
                opacity: 1;
            }
        }
        .trap-banner {
            position: absolute;
            background-color: #ffffff;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3d3d3d;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 1px;
            transform-origin: center;
            padding: 0 16px;
            white-space: nowrap;
            opacity: 0;
            box-sizing: border-box;
            border: 3px solid #111;
            animation: slamBanner 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes slamBanner {
            0% {
                transform: scale(3) rotate(var(--angle));
                opacity: 0;
            }
            100% {
                transform: scale(1) rotate(var(--angle));
                opacity: 1;
            }
        }

        #trailsShowroom {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 5000;
            display: none;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        #trailsShowroom.open {
            opacity: 1;
        }
        #trailsShowroom.open .sr-popup-window {
            transform: scale(1) translateY(0);

                    <div class="sr-subtitle" id="trSkinName"></div>
                    <button class="sr-nav-btn" id="trNavLeft"><</button>
                    <button class="sr-nav-btn" id="trNavRight">></button>
                    <div class="trail-preview-box" id="trPreviewBox"></div>
                    <div class="sr-floor-shadow"></div>
                    <button class="sr-action-btn" id="trActionBtn">BUY</button>
                </div>
            </div>
        </div>

        <div id="leaderboardPopup">
            <div class="lb-window">
                <button id="lbCloseBtn">X</button>
                <div class="lb-title">
                    LEADERBOARD
                </div>
                <div class="lb-toggle-row">

                    <span class="score">SCORE</span>

                    <label class="lb-switch">
                        <input type="checkbox" id="lbToggle">
                        <span class="slider"></span>
                    </label>

                    <span class="streak">STREAK</span>

                </div>
                <div class="lb-header">
                    <span>#</span>
                    <span>PLAYER</span>
                    <span>SCORE</span>
                </div>

                <div id="leaderboardList"></div>
            </div>
        </div>

    </div>
    <script src="game.js"></script>
</body>

</html>
